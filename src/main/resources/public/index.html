<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestión de Eventos Académicos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Eventos Académicos</a>
    <div class="ms-auto d-flex gap-2">
      <span id="meLabel" class="badge text-bg-info"></span>
      <button id="logoutBtn" class="btn btn-sm btn-outline-light">Salir</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card">
        <div class="card-body">
          <h5>Login</h5>
          <input id="email" class="form-control mb-2" placeholder="email">
          <input id="password" type="password" class="form-control mb-2" placeholder="password">
          <button id="loginBtn" class="btn btn-primary w-100">Entrar</button>
          <hr>
          <h6>Registro participante</h6>
          <input id="rname" class="form-control mb-2" placeholder="Nombre">
          <input id="remail" class="form-control mb-2" placeholder="Email">
          <input id="rpass" type="password" class="form-control mb-2" placeholder="Password">
          <button id="registerBtn" class="btn btn-outline-primary w-100">Crear cuenta</button>
        </div>
      </div>

      <div class="card mt-3" id="eventFormCard">
        <div class="card-body">
          <h5>Crear/Editar evento</h5>
          <input id="evId" type="hidden">
          <input id="title" class="form-control mb-2" placeholder="Título">
          <textarea id="description" class="form-control mb-2" placeholder="Descripción"></textarea>
          <input id="dateTime" type="datetime-local" class="form-control mb-2">
          <input id="location" class="form-control mb-2" placeholder="Lugar">
          <input id="maxCapacity" type="number" class="form-control mb-2" placeholder="Cupo">
          <button id="saveEventBtn" class="btn btn-success w-100">Guardar evento</button>
        </div>
      </div>

      <div class="card mt-3" id="scanCard">
        <div class="card-body">
          <h5>Validar asistencia por token</h5>
          <input id="scanToken" class="form-control mb-2" placeholder="Token del QR">
          <button id="scanBtn" class="btn btn-warning w-100">Marcar asistencia</button>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h4>Eventos publicados</h4>
        <button id="toggleViewBtn" class="btn btn-outline-secondary btn-sm">Cambiar vista</button>
      </div>
      <div id="eventsContainer" class="row g-3"></div>

      <div class="card mt-4" id="statsCard">
        <div class="card-body">
          <h5>Resumen del evento seleccionado</h5>
          <div id="summary" class="mb-3"></div>
          <canvas id="chart1" height="120"></canvas>
          <canvas id="chart2" height="120" class="mt-3"></canvas>
        </div>
      </div>

      <div class="card mt-4" id="usersCard">
        <div class="card-body">
          <h5>Administración de usuarios</h5>
          <div id="usersTable"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
